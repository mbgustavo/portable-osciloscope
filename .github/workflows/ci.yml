name: CI - Build & Test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  linux-build:
    name: Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev portaudio19-dev pkg-config

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: linux-build
          path: build/

  windows-build:
    name: Windows Build
    runs-on: windows-latest

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-release
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/triplets
      VCPKG_BINARY_SOURCES: clear

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Windows Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.1"
          arch: win64_msvc2022_64
          cache: true

      - name: Install Windows dependencies
        uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: false
          vcpkgJsonGlob: "**/vcpkg.json"

      - name: Install Windows build tools
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET="$env:VCPKG_DEFAULT_TRIPLET" -DVCPKG_OVERLAY_TRIPLETS="$env:VCPKG_OVERLAY_TRIPLETS"

      - name: Build
        run: cmake --build build --config Release

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev portaudio19-dev pkg-config gcovr xmlstarlet

      - name: Configure coverage
        run: cmake -S . -B build-coverage -DCMAKE_BUILD_TYPE=Debug -DOSCILLOSCOPE_ENABLE_COVERAGE=ON

      - name: Build and generate coverage
        run: cmake --build build-coverage --target coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            build-coverage/coverage/index.html
            build-coverage/coverage/*.css
            build-coverage/coverage/coverage.xml

      - name: Extract Coverage Percentage
        id: extract_cov
        run: |
          COVERAGE=$(xmlstarlet sel -t -v "string(//coverage/@line-rate)" build-coverage/coverage/coverage.xml)
          PERCENTAGE=$(echo "($COVERAGE * 100) / 1" | bc)
          echo "COVERAGE_PERCENT=${PERCENTAGE}" >> $GITHUB_ENV
          if [ "$PERCENTAGE" -ge 75 ]; then
            echo "COLOR=brightgreen" >> $GITHUB_ENV
          elif [ "$PERCENTAGE" -ge 50 ]; then
            echo "COLOR=yellow" >> $GITHUB_ENV
          else
            echo "COLOR=red" >> $GITHUB_ENV
          fi

      - name: Generate Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          curl -o coverage.svg "https://img.shields.io/badge/coverage-${{ env.COVERAGE_PERCENT }}%25-${{ env.COLOR }}"

      - name: Commit and Push Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add coverage.svg
          if ! git diff --staged --quiet; then
            git commit -m "update coverage badge [skip ci]"
            git push
          fi

  test:
    name: Test
    needs: linux-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux build
        uses: actions/download-artifact@v7
        with:
          name: linux-build
          path: build

      - name: Restore Linux executable permissions
        run: chmod +x build/portable-osciloscope build/tests/signal_monitor_smoke_test

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev portaudio19-dev

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  code-quality:
    name: Code Quality
    needs: linux-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux build
        uses: actions/download-artifact@v7
        with:
          name: linux-build
          path: build

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev \
            portaudio19-dev \
            pkg-config \
            clang-format \
            clang-tidy
          python3 -m pip install --user cmakelang
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: ./scripts/lint.sh --all
