name: CI - Build & Test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  linux-build:
    uses: ./.github/workflows/linux-build.yml

  windows-build:
    uses: ./.github/workflows/windows-build.yml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev portaudio19-dev pkg-config gcovr xmlstarlet

      - name: Configure coverage
        run: cmake -S . -B build-coverage -DCMAKE_BUILD_TYPE=Debug -DOSCILLOSCOPE_ENABLE_COVERAGE=ON

      - name: Build and generate coverage
        run: cmake --build build-coverage --target coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            build-coverage/coverage/index.html
            build-coverage/coverage/*.css
            build-coverage/coverage/coverage.xml

      - name: Extract Coverage Percentage
        id: extract_cov
        run: |
          COVERAGE=$(xmlstarlet sel -t -v "string(//coverage/@line-rate)" build-coverage/coverage/coverage.xml)
          PERCENTAGE=$(echo "($COVERAGE * 100) / 1" | bc)
          echo "COVERAGE_PERCENT=${PERCENTAGE}" >> $GITHUB_ENV
          if [ "$PERCENTAGE" -ge 75 ]; then
            echo "COLOR=brightgreen" >> $GITHUB_ENV
          elif [ "$PERCENTAGE" -ge 50 ]; then
            echo "COLOR=yellow" >> $GITHUB_ENV
          else
            echo "COLOR=red" >> $GITHUB_ENV
          fi

      - name: Generate Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          curl -o coverage.svg "https://img.shields.io/badge/coverage-${{ env.COVERAGE_PERCENT }}%25-${{ env.COLOR }}"

      - name: Commit and Push Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add coverage.svg
          if ! git diff --staged --quiet; then
            git commit -m "update coverage badge [skip ci]"
            git push
          fi

  test:
    name: Test
    needs: linux-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux build
        uses: actions/download-artifact@v7
        with:
          name: linux-build
          path: build

      - name: Restore Linux executable permissions
        run: chmod +x build/portable-osciloscope build/tests/signal_monitor_smoke_test

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev portaudio19-dev

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  code-quality:
    name: Code Quality
    needs: linux-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux build
        uses: actions/download-artifact@v7
        with:
          name: linux-build
          path: build

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev \
            portaudio19-dev \
            pkg-config \
            clang-format \
            clang-tidy
          python3 -m pip install --user cmakelang
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: ./scripts/lint.sh --all
