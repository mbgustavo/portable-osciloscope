name: CI - Build and Test 

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checko  ut
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev portaudio19-dev pkg-config

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: "**/vcpkg.json"

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev portaudio19-dev pkg-config gcovr xmlstarlet

      - name: Configure coverage
        run: cmake -S . -B build-coverage -DCMAKE_BUILD_TYPE=Debug -DOSCILLOSCOPE_ENABLE_COVERAGE=ON

      - name: Build and generate coverage
        run: cmake --build build-coverage --target coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build-coverage/coverage/index.html
            build-coverage/coverage/*.css
            build-coverage/coverage/coverage.xml

      - name: Extract Coverage Percentage
        id: extract_cov
        run: |
          COVERAGE=$(xmlstarlet sel -t -v "string(//coverage/@line-rate)" build-coverage/coverage/coverage.xml)
          PERCENTAGE=$(echo "($COVERAGE * 100) / 1" | bc)
          echo "COVERAGE_PERCENT=${PERCENTAGE}" >> $GITHUB_ENV
          
          if [ "$PERCENTAGE" -ge 90 ]; then
            echo "COLOR=brightgreen" >> $GITHUB_ENV
          elif [ "$PERCENTAGE" -ge 75 ]; then
            echo "COLOR=yellow" >> $GITHUB_ENV
          else
            echo "COLOR=red" >> $GITHUB_ENV
          fi

      - name: Generate Coverage Badge
        run: |
          curl -o coverage.svg "https://shields.io{{ env.COVERAGE_PERCENT }}%25-${{ env.COLOR }}"

      - name: Commit and Push Badge
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add coverage.svg
          # Only commit if the badge file has actually changed to avoid redundant commits
          git diff-index --quiet HEAD || git commit -m "update coverage badge [skip ci]"
          git push
